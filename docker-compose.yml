version: "3.9"

services:
  esports-bot:
    build: .
    container_name: esports-polymarket-bot
    restart: unless-stopped
    env_file: .env
    environment:
      - DB_PATH=/app/data/bot.db
    volumes:
      # Persist SQLite DB + logs across container restarts
      - bot-data:/app/data
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  bot-data:
